name: Playwright Tests
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Qase Run ID'
        required: true
        type: string
      case_ids:
        description: 'Space separated Case IDs to run'
        required: false
        type: string
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    # 1. ติดตั้ง Node (ลบบรรทัด cache: 'npm' ออก)
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        
    - name: Install dependencies
      run: npm install
      
    # 2. ทำระบบ Cache สำหรับ Browser ของ Playwright (โหลดนานสุดคืออันนี้)
    - name: Cache Playwright Browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('**/package.json') }}
        
    - name: Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      env:
        QASE_RUN_ID: ${{ github.event.inputs.run_id }}
        QASE_WEBHOOK_URL: 'http://164.68.113.171:3000/api/webhooks/playwright/reporter'
      run: npx playwright test ${{ github.event.inputs.case_ids }}
