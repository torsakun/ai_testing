name: Playwright Tests
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Qase Run ID'
        required: true
        type: string

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm install
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      env:
        # รับค่า Run ID จากเว็บเรา
        QASE_RUN_ID: ${{ github.event.inputs.run_id }}
        # ชี้เป้า URL ของ Webhook มาที่เซิร์ฟเวอร์ VPS ของเรา
        QASE_WEBHOOK_URL: 'http://164.68.113.171:3000/api/webhooks/playwright/reporter'
      run: npx playwright test
