name: Playwright Tests
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'TESSA Run ID'
        required: true
      case_ids:
        description: 'TESSA Case IDs (space separated)'
        required: true
      api_url:
        description: 'TESSA API URL'
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      
      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          PATTERN=$(echo "${{ github.event.inputs.case_ids }}" | tr ' ' '|')
          npx playwright test -g "$PATTERN"
        env:
          TESSA_RUN_ID: ${{ github.event.inputs.run_id }}
          TESSA_API_URL: ${{ github.event.inputs.api_url }}

      - name: Upload HTML Report to TESSA
        if: always()
        run: |
          if [ -d "playwright-report" ]; then
            cd playwright-report
            zip -r report.zip .
            curl -X POST -F "file=@report.zip" ${{ github.event.inputs.api_url }}/api/webhooks/playwright/${{ github.event.inputs.run_id }}/report
          else
            echo "No playwright-report directory found."
          fi
